<!-- Data extracted from syllabus: :contentReference[oaicite:0]{index=0} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classical Literature Schedule</title>

<style>
body{
font-family:Segoe UI,Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:10px;
}

#countdown{
text-align:center;
font-size:22px;
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.35);
transition:transform .2s;
}

.card:hover{
transform:translateY(-5px);
}

.date{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
color:#38bdf8;
}

.mode{
display:inline-block;
padding:4px 10px;
border-radius:6px;
font-size:12px;
margin-bottom:10px;
}

.inclass{background:#22c55e;}
.async{background:#a855f7;}

.topic{
font-size:15px;
line-height:1.5;
}

.week{
font-size:13px;
opacity:.7;
margin-bottom:6px;
}
</style>
</head>

<body>

<h1>Classical Literature — Class Schedule</h1>

<div id="countdown">Loading next class...</div>

<div class="container" id="schedule"></div>

<script>

const classes = [

{date:"2026-03-02T09:30:00",mode:"Asynchronous",week:1,topic:"Orientation"},
{date:"2026-03-04T09:30:00",mode:"In-class lecture",week:1,topic:"Aeschylus — Agamemnon"},

{date:"2026-03-09T09:30:00",mode:"Asynchronous",week:2,topic:"Agamemnon"},
{date:"2026-03-11T09:30:00",mode:"In-class lecture",week:2,topic:"Agamemnon"},

{date:"2026-03-16T09:30:00",mode:"Asynchronous",week:3,topic:"Agamemnon"},
{date:"2026-03-18T09:30:00",mode:"In-class lecture",week:3,topic:"Agamemnon"},

{date:"2026-03-23T09:30:00",mode:"Asynchronous",week:4,topic:"Agamemnon"},
{date:"2026-03-25T09:30:00",mode:"In-class lecture",week:4,topic:"Agamemnon"},

{date:"2026-03-30T09:30:00",mode:"Asynchronous",week:5,topic:"Agamemnon"},
{date:"2026-04-01T09:30:00",mode:"In-class lecture",week:5,topic:"Agamemnon"},

{date:"2026-04-06T09:30:00",mode:"Asynchronous",week:6,topic:"Sophocles — Oedipus the King"},
{date:"2026-04-08T09:30:00",mode:"In-class lecture",week:6,topic:"Oedipus the King"},

{date:"2026-04-13T09:30:00",mode:"Asynchronous",week:7,topic:"Oedipus the King"},
{date:"2026-04-15T09:30:00",mode:"In-class lecture",week:7,topic:"Oedipus the King"},

{date:"2026-04-20T09:30:00",mode:"Asynchronous",week:8,topic:"Oedipus the King"},
{date:"2026-04-22T09:30:00",mode:"In-class lecture",week:8,topic:"Oedipus the King"},

{date:"2026-04-27T09:30:00",mode:"Asynchronous",week:9,topic:"Midterm Examination"},
{date:"2026-04-29T09:30:00",mode:"In-class lecture",week:9,topic:"Euripides — Medea"},

{date:"2026-05-04T09:30:00",mode:"Asynchronous",week:10,topic:"Medea"},
{date:"2026-05-06T09:30:00",mode:"In-class lecture",week:10,topic:"Medea"},

{date:"2026-05-11T09:30:00",mode:"Asynchronous",week:11,topic:"Homer — The Odyssey"},
{date:"2026-05-13T09:30:00",mode:"In-class lecture",week:11,topic:"The Odyssey"},

{date:"2026-05-18T09:30:00",mode:"Asynchronous",week:12,topic:"The Odyssey"},
{date:"2026-05-20T09:30:00",mode:"In-class lecture",week:12,topic:"The Odyssey"},

{date:"2026-05-25T09:30:00",mode:"Asynchronous",week:13,topic:"Eid Holiday"},
{date:"2026-05-27T09:30:00",mode:"In-class lecture",week:13,topic:"Eid Holiday"},

{date:"2026-06-01T09:30:00",mode:"Asynchronous",week:14,topic:"The Odyssey"},
{date:"2026-06-03T09:30:00",mode:"In-class lecture",week:14,topic:"Virgil — The Aeneid"},

{date:"2026-06-08T09:30:00",mode:"Asynchronous",week:15,topic:"The Aeneid"},
{date:"2026-06-10T09:30:00",mode:"In-class lecture",week:15,topic:"The Aeneid & Ovid — Apollo and Daphne"},

{date:"2026-06-15T09:30:00",mode:"Asynchronous",week:16,topic:"Revision"},
{date:"2026-06-17T09:30:00",mode:"In-class lecture",week:16,topic:"Revision"}
];

const container=document.getElementById("schedule");

classes.forEach(c=>{
let d=new Date(c.date);
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="week">Week ${c.week}</div>
<div class="date">${d.toDateString()} — ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
<div class="mode ${c.mode.includes("In-class")?"inclass":"async"}">${c.mode}</div>
<div class="topic">${c.topic}</div>
`;

container.appendChild(card);
});

function updateCountdown(){

let now=new Date();

let upcoming=classes
.map(c=>({...c,dateObj:new Date(c.date)}))
.filter(c=>c.dateObj>now)
.sort((a,b)=>a.dateObj-b.dateObj)[0];

if(!upcoming){
document.getElementById("countdown").innerText="All classes completed.";
return;
}

let diff=upcoming.dateObj-now;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let minutes=Math.floor((diff/(1000*60))%60);
let seconds=Math.floor((diff/1000)%60);

document.getElementById("countdown").innerHTML=
`Next Class: <b>${upcoming.topic}</b><br>
${upcoming.mode} — ${upcoming.dateObj.toDateString()}<br>
⏳ ${days}d ${hours}h ${minutes}m ${seconds}s`;

}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
