<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Student Files Library</title>
    <link rel="icon" href="favicon2.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-soft: #eef2ff;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --light: #f9fafb;
            --dark: #111827;
            --gray: #6b7280;
            --gray-light: #e5e7eb;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --card-bg: #ffffff;
            
            --pdf: #ef4444;
            --folder: #f59e0b;
            --image: #3b82f6;
            --video: #8b5cf6;
            --document: #10b981;
            --spreadsheet: #059669;
            --presentation: #ea580c;
            --archive: #eab308;
            --audio: #14b8a6;
            --text: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f3f4f6 0%, #eef2ff 100%);
            min-height: 100vh;
            color: var(--dark);
            line-height: 1.5;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            flex-shrink: 0;
            box-shadow: var(--shadow-lg);
        }

        .title h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .title p {
            color: var(--gray);
            font-size: 14px;
            font-weight: 500;
            margin-top: 4px;
        }

        .stats {
            display: flex;
            gap: 24px;
            background: var(--light);
            padding: 12px 28px;
            border-radius: 60px;
            border: 1px solid var(--border);
            width: fit-content;
        }

        .stat-item {
            text-align: center;
            padding: 0 8px;
        }

        .stat-number {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            display: block;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 600;
        }

        /* V2 Glow Button */
        .v2-update-wrapper {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .v2-glow-btn {
            background: linear-gradient(145deg, #ff6b6b, #f093fb, #f5576c);
            background-size: 200% 200%;
            border: none;
            padding: 16px 36px;
            border-radius: 80px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 10px 28px rgba(245, 87, 108, 0.5);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,245,0.4);
            animation: gradientShift 3s ease infinite, gentlePulse 2s infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes gentlePulse {
            0% { box-shadow: 0 8px 22px rgba(245, 87, 108, 0.4); transform: scale(1); }
            100% { box-shadow: 0 18px 36px rgba(245, 87, 108, 0.7), 0 0 20px rgba(240, 147, 251, 0.6); transform: scale(1.02); }
        }

        .v2-glow-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 24px 44px rgba(245, 87, 108, 0.8);
        }

        /* Search Section */
        .search-section {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            border: 2px solid var(--border);
            border-radius: 60px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: #ffffff;
            padding-left: 52px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .search-input:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .search-icon-left {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
        }

        .search-actions {
            display: flex;
            gap: 12px;
        }

        .search-btn, .clear-btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        .search-btn {
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .search-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .clear-btn {
            background: var(--gray-light);
            color: var(--gray);
        }

        .clear-btn:hover {
            background: #d1d5db;
            color: var(--dark);
        }

        /* Sort Section */
        .sort-section {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }

        .sort-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            justify-content: space-between;
        }

        .sort-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .sort-label {
            font-weight: 700;
            color: var(--dark);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sort-buttons, .order-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sort-chip, .order-chip {
            padding: 8px 20px;
            border: 1.5px solid var(--border);
            background: white;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sort-chip:hover, .order-chip:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
            transform: translateY(-1px);
        }

        .sort-chip.active, .order-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* URL Indicator Badge */
        .url-share-badge {
            background: var(--primary-soft);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .url-share-badge:hover {
            background: var(--primary);
            color: white;
        }
        .url-share-badge i {
            font-size: 14px;
        }

        /* Files Container */
        .files-container {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 28px;
            box-shadow: var(--shadow-xl);
            min-height: 500px;
            margin-bottom: 24px;
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--gray-light);
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .files-count-badge {
            background: var(--primary-soft);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            background: var(--light);
            padding: 5px;
            border-radius: 60px;
        }

        .view-btn {
            padding: 8px 22px;
            border: none;
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* Grid Cards */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 24px;
        }

        .file-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .file-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .file-icon {
            width: 58px;
            height: 58px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            font-size: 30px;
        }

        .file-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .file-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            color: var(--gray);
        }

        .file-date {
            font-size: 12px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray);
        }

        .file-actions {
            position: absolute;
            top: 18px;
            right: 18px;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .file-card:hover .file-actions {
            opacity: 1;
        }

        .open-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .open-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.08);
        }

        /* List View */
        .files-list {
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .file-row {
            display: grid;
            grid-template-columns: 50px minmax(0, 3fr) 110px 130px;
            align-items: center;
            padding: 14px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            transition: all 0.2s;
            cursor: pointer;
            gap: 16px;
        }

        .file-row:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        /* Status */
        .loading-state, .empty-state, .error-state {
            text-align: center;
            padding: 70px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gray-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .retry-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .size-sm { color: #10b981; font-weight: 600; }
        .size-md { color: #f59e0b; font-weight: 600; }
        .size-lg { color: #ef4444; font-weight: 600; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .stats { padding: 8px 20px; gap: 16px; }
            .file-row { grid-template-columns: 40px minmax(0, 2fr) 80px; }
            .list-date { display: none; }
        }

        .file-icon.pdf { background: rgba(239, 68, 68, 0.12); color: var(--pdf); }
        .file-icon.folder { background: rgba(245, 158, 11, 0.12); color: var(--folder); }
        .file-icon.image { background: rgba(59, 130, 246, 0.12); color: var(--image); }
        .file-icon.video { background: rgba(139, 92, 246, 0.12); color: var(--video); }
        .file-icon.document { background: rgba(16, 185, 129, 0.12); color: var(--document); }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo"><i class="fas fa-graduation-cap"></i></div>
                <div class="title">
                    <h1>Student Files Library</h1>
                    <p>Shareable links • Search & filter preserved in URL</p>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item"><span class="stat-number" id="totalFiles">0</span><span class="stat-label">Total Files</span></div>
                <div class="stat-item"><span class="stat-number" id="recentFiles">0</span><span class="stat-label">This Week</span></div>
            </div>
        </div>
    </header>

    <div class="v2-update-wrapper">
        <button class="v2-glow-btn" id="v2NotifyBtn">
            <i class="fas fa-magic"></i> ✨ Try latest_v2 — Fresh UI & Smart Features ✨ <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <section class="search-section">
        <div class="search-box">
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon-left"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search by file name, type... (URL updates automatically)">
            </div>
            <div class="search-actions">
                <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> Search</button>
                <button class="clear-btn" id="clearSearchBtn" style="display: none;"><i class="fas fa-times"></i> Clear</button>
            </div>
        </div>
        <!-- Shareable URL indicator -->
        <div id="shareableUrlBadge" class="url-share-badge" style="display: none;">
            <i class="fas fa-link"></i> <span id="urlHintText">Share this link to keep search filters</span>
            <i class="fas fa-copy"></i>
        </div>
    </section>

    <section class="sort-section">
        <div class="sort-controls">
            <div class="sort-group">
                <span class="sort-label"><i class="fas fa-arrow-up-wide-short"></i> Sort</span>
                <div class="sort-buttons">
                    <button class="sort-chip" data-sort="date"><i class="far fa-calendar"></i> Date</button>
                    <button class="sort-chip" data-sort="name"><i class="fas fa-font"></i> Name</button>
                    <button class="sort-chip" data-sort="size"><i class="fas fa-database"></i> Size</button>
                </div>
            </div>
            <div class="sort-group">
                <span class="sort-label"><i class="fas fa-sort"></i> Order</span>
                <div class="order-buttons">
                    <button class="order-chip" data-order="desc"><i class="fas fa-arrow-down-wide-short"></i> Newest / Z→A</button>
                    <button class="order-chip" data-order="asc"><i class="fas fa-arrow-up-wide-short"></i> Oldest / A→Z</button>
                </div>
            </div>
        </div>
    </section>

    <section class="files-container">
        <div class="files-header">
            <h2 class="section-title"><i class="fas fa-folder-tree"></i> Library <span class="files-count-badge" id="filesCount">(0)</span></h2>
            <div class="view-toggle">
                <button class="view-btn active" id="gridViewBtn"><i class="fas fa-th-large"></i> Grid</button>
                <button class="view-btn" id="listViewBtn"><i class="fas fa-list-ul"></i> List</button>
            </div>
        </div>
        <div id="filesContent"><div class="loading-state"><div class="spinner"></div><p>Syncing with Google Drive...</p></div></div>
    </section>
    <footer class="footer" style="text-align:center; padding:20px; color:var(--gray);"><i class="fas fa-sync-alt"></i> Auto-sync every 5 min • Powered by Qusai</footer>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuzws_2LcDC8nb2KU-02swjehyRf1ivY14EbX1qcJC1chCUTLTOAAwtQ5JlXvNcLez/exec';
    let allFiles = [], filteredFiles = [];
    let currentView = 'grid', currentSort = 'date', currentOrder = 'desc', currentSearch = '';
    let isLoading = false;

    const filesContent = document.getElementById('filesContent');
    const totalFilesEl = document.getElementById('totalFiles');
    const recentFilesEl = document.getElementById('recentFiles');
    const filesCountEl = document.getElementById('filesCount');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const shareableBadge = document.getElementById('shareableUrlBadge');
    const urlHintText = document.getElementById('urlHintText');

    // ========== URL PARAMETER MANAGEMENT ==========
    function updateURLParams() {
        const params = new URLSearchParams();
        if (currentSearch && currentSearch.trim() !== '') {
            params.set('search', currentSearch.trim());
        }
        if (currentSort !== 'date') {
            params.set('sort', currentSort);
        }
        if (currentOrder !== 'desc') {
            params.set('order', currentOrder);
        }
        if (currentView !== 'grid') {
            params.set('view', currentView);
        }
        
        const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        window.history.replaceState({}, '', newUrl);
        
        // Update shareable badge
        if (currentSearch && currentSearch.trim() !== '') {
            shareableBadge.style.display = 'inline-flex';
            urlHintText.innerText = `🔍 Searching "${currentSearch}" — copy & share this link`;
        } else if (params.toString()) {
            shareableBadge.style.display = 'inline-flex';
            urlHintText.innerText = `⚡ Custom view — share this filtered link`;
        } else {
            shareableBadge.style.display = 'none';
        }
    }
    
    function loadURLParams() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('search')) {
            currentSearch = params.get('search');
            searchInput.value = currentSearch;
        }
        if (params.has('sort')) {
            currentSort = params.get('sort');
        }
        if (params.has('order')) {
            currentOrder = params.get('order');
        }
        if (params.has('view')) {
            currentView = params.get('view');
            if (currentView === 'grid') document.getElementById('gridViewBtn').classList.add('active');
            else document.getElementById('listViewBtn').classList.add('active');
            if (currentView === 'grid') document.getElementById('listViewBtn').classList.remove('active');
            else document.getElementById('gridViewBtn').classList.remove('active');
        }
        updateSortButtons();
    }
    
    // Helper functions
    function formatFileSize(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    function getSizeClass(bytes) {
        if (bytes < 1024*1024) return 'size-sm';
        if (bytes < 1024*1024*10) return 'size-md';
        return 'size-lg';
    }
    function formatDate(dateString) {
        try {
            const date = new Date(dateString);
            if (isNaN(date)) return 'Recent';
            const now = new Date();
            const diffDays = Math.floor((now - date) / (86400000));
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        } catch(e) { return 'Recent'; }
    }
    function getFileIconHTML(iconType) {
        const map = { folder:'fa-folder', pdf:'fa-file-pdf', image:'fa-file-image', video:'fa-file-video', document:'fa-file-word', spreadsheet:'fa-file-excel', presentation:'fa-file-powerpoint', archive:'fa-file-archive', audio:'fa-file-audio', text:'fa-file-alt', file:'fa-file' };
        return `<i class="fas ${map[iconType] || 'fa-file'}"></i>`;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function updateStatsAndUI(files) {
        const total = allFiles.length;
        const filteredCount = files.length;
        const weekAgo = new Date(Date.now() - 7*86400000);
        const recent = allFiles.filter(f => { try { return new Date(f.dateUploaded) >= weekAgo; } catch(e){ return false; } }).length;
        totalFilesEl.textContent = total.toLocaleString();
        recentFilesEl.textContent = recent.toLocaleString();
        filesCountEl.textContent = `(${filteredCount})`;
        clearSearchBtn.style.display = currentSearch ? 'inline-flex' : 'none';
    }

    function sortFiles(files) {
        return [...files].sort((a,b) => {
            let va, vb;
            if (currentSort === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
            else if (currentSort === 'size') { va = a.size || 0; vb = b.size || 0; }
            else { va = new Date(a.dateUploaded).getTime(); vb = new Date(b.dateUploaded).getTime(); }
            if (currentOrder === 'asc') return va > vb ? 1 : -1;
            else return va < vb ? 1 : -1;
        });
    }

    function renderGrid(files) {
        if (!files.length) return `<div class="empty-state"><div class="empty-icon"><i class="fas fa-folder-open fa-3x" style="color:#cbd5e1;"></i></div><h3 style="margin-top:16px;">${currentSearch ? 'No matching files' : 'Library is empty'}</h3><p>${currentSearch ? 'Try a different keyword or clear search' : 'Files will appear after upload'}</p></div>`;
        const sorted = sortFiles(files);
        return `<div class="files-grid">${sorted.map(f => `
            <div class="file-card" data-id="${f.id}" onclick="openFile('${f.url}')">
                <div class="file-actions"><button class="open-btn" onclick="event.stopPropagation(); openFile('${f.url}')"><i class="fas fa-external-link-alt"></i></button></div>
                <div class="file-icon ${f.icon}">${getFileIconHTML(f.icon)}</div>
                <h3 class="file-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</h3>
                <div class="file-meta"><span><i class="fas fa-hdd"></i> <span class="${getSizeClass(f.size || 0)}">${formatFileSize(f.size || 0)}</span></span><span><i class="fas fa-tag"></i> ${f.icon}</span></div>
                <div class="file-date"><i class="far fa-clock"></i> ${formatDate(f.dateUploaded)}</div>
            </div>`).join('')}</div>`;
    }
    function renderList(files) {
        if (!files.length) return renderGrid(files);
        const sorted = sortFiles(files);
        return `<div class="files-list">${sorted.map(f => `<div class="file-row" onclick="openFile('${f.url}')"><div class="list-icon ${f.icon}">${getFileIconHTML(f.icon)}</div><div class="list-name">${escapeHtml(f.name)}</div><div class="list-size ${getSizeClass(f.size || 0)}">${formatFileSize(f.size || 0)}</div><div class="list-date">${formatDate(f.dateUploaded)}</div></div>`).join('')}</div>`;
    }

    function renderFiles(files) {
        updateStatsAndUI(files);
        filesContent.innerHTML = currentView === 'grid' ? renderGrid(files) : renderList(files);
        const gridDiv = document.querySelector('.files-grid');
        const listDiv = document.querySelector('.files-list');
        if (gridDiv) gridDiv.style.display = currentView === 'grid' ? 'grid' : 'none';
        if (listDiv) listDiv.style.display = currentView === 'list' ? 'flex' : 'none';
    }

    // Perform search and update URL
    function performSearch() {
        if (isLoading) {
            filesContent.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading files, please wait...</p></div>`;
            return;
        }
        currentSearch = searchInput.value.trim();
        if (!currentSearch) {
            filteredFiles = [...allFiles];
        } else {
            const lower = currentSearch.toLowerCase();
            filteredFiles = allFiles.filter(f => f.name.toLowerCase().includes(lower) || f.icon.toLowerCase().includes(lower));
        }
        renderFiles(filteredFiles);
        updateURLParams();  // 🔥 Update URL with search parameter
        updateSortButtons();
    }

    function clearSearch() {
        if (isLoading) return;
        searchInput.value = '';
        currentSearch = '';
        filteredFiles = [...allFiles];
        renderFiles(filteredFiles);
        updateURLParams(); // clear search from URL
    }

    async function loadFiles(keepSearchState = false) {
        if (isLoading) return;
        isLoading = true;
        searchInput.disabled = true;
        searchBtn.disabled = true;
        clearSearchBtn.disabled = true;
        
        filesContent.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading latest files from Google Drive...</p></div>`;
        try {
            const url = `${SCRIPT_URL}?t=${Date.now()}&sort=${currentSort}&order=${currentOrder}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch(e) { throw new Error('Invalid response format'); }
            if (data && data.success && Array.isArray(data.files)) {
                allFiles = data.files.map(f => ({ ...f, size: f.size || 0, dateUploaded: f.dateUploaded || new Date().toISOString() }));
                if (!keepSearchState) {
                    // If we have currentSearch from URL params, apply it
                    if (currentSearch) {
                        const lower = currentSearch.toLowerCase();
                        filteredFiles = allFiles.filter(f => f.name.toLowerCase().includes(lower) || f.icon.toLowerCase().includes(lower));
                    } else {
                        filteredFiles = [...allFiles];
                    }
                } else {
                    if (currentSearch) {
                        const lower = currentSearch.toLowerCase();
                        filteredFiles = allFiles.filter(f => f.name.toLowerCase().includes(lower) || f.icon.toLowerCase().includes(lower));
                    } else {
                        filteredFiles = [...allFiles];
                    }
                }
                renderFiles(filteredFiles);
            } else throw new Error('Invalid data');
        } catch (err) {
            console.error(err);
            filesContent.innerHTML = `<div class="error-state"><div class="empty-icon"><i class="fas fa-cloud-slash fa-3x"></i></div><h3>Sync Failed</h3><p>${err.message}</p><button class="retry-btn" onclick="window.loadFiles()"><i class="fas fa-redo-alt"></i> Retry Now</button></div>`;
        } finally {
            isLoading = false;
            searchInput.disabled = false;
            searchBtn.disabled = false;
            clearSearchBtn.disabled = false;
            updateSortButtons();
        }
    }

    function openFile(url) { window.open(url, '_blank'); }
    function toggleView(view) {
        if (isLoading) return;
        currentView = view;
        document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
        document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
        renderFiles(filteredFiles);
        updateURLParams(); // store view preference
    }
    function setSort(sortBy) { if(isLoading) return; currentSort = sortBy; renderFiles(filteredFiles); updateURLParams(); updateSortButtons(); }
    function setOrder(order) { if(isLoading) return; currentOrder = order; renderFiles(filteredFiles); updateURLParams(); updateSortButtons(); }
    function updateSortButtons() {
        document.querySelectorAll('.sort-chip').forEach(btn => btn.classList.toggle('active', btn.dataset.sort === currentSort));
        document.querySelectorAll('.order-chip').forEach(btn => btn.classList.toggle('active', btn.dataset.order === currentOrder));
    }
    
    function copyShareableLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            const originalText = urlHintText.innerText;
            urlHintText.innerText = '✅ Link copied to clipboard!';
            setTimeout(() => {
                if (currentSearch) urlHintText.innerText = `🔍 Searching "${currentSearch}" — copy & share this link`;
                else urlHintText.innerText = `⚡ Custom view — share this filtered link`;
            }, 2000);
        });
    }
    
    function notifyV2() {
        const base = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        window.location.href = base + 'latest_v2';
    }

    // Event binding
    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    document.getElementById('gridViewBtn').addEventListener('click', () => toggleView('grid'));
    document.getElementById('listViewBtn').addEventListener('click', () => toggleView('list'));
    document.querySelectorAll('.sort-chip').forEach(btn => btn.addEventListener('click', () => setSort(btn.dataset.sort)));
    document.querySelectorAll('.order-chip').forEach(btn => btn.addEventListener('click', () => setOrder(btn.dataset.order)));
    document.getElementById('v2NotifyBtn').addEventListener('click', notifyV2);
    shareableBadge.addEventListener('click', copyShareableLink);
    
    let debounceTimeout;
    searchInput.addEventListener('input', () => {
        if (isLoading) return;
        clearTimeout(debounceTimeout);
        debounceTimeout = setTimeout(performSearch, 400);
    });

    window.openFile = openFile;
    window.loadFiles = loadFiles;
    
    document.addEventListener('DOMContentLoaded', () => {
        loadURLParams();
        loadFiles(true);
        setInterval(() => { if (!isLoading) loadFiles(true); }, 300000);
    });
</script>
